paper_id: listov2025
input_file: data/input/listov2025/listov2025.md
input_images_dir: data/input/listov2025/images

# Human-curated expected values for the Listov 2025 paper:
# "De novo design of stable, efficient Kemp eliminases" (Nature 2025)
# DOI: https://doi.org/10.1038/s41586-025-09136-2
#
# Values verified against:
#   data/output/listov2025/enzyme_extraction_pipeline_20260319_232337/
#
# Tolerances set to 15% to accommodate model variation across runs.

agents:
  document_structure_analyzer:
    schema: document_structure
    key_facts:
      # Paper has 7 sections (Abstract + 5 body + Methods)
      - { field: "sections", condition: "length_gte", value: 5 }
      # Extended Data includes tables 1-3
      - { field: "tables", condition: "length_gte", value: 3 }
      # Paper has 14 images across main figures + extended data
      - { field: "images", condition: "length_gte", value: 5 }

  enzyme_kinetics_extractor:
    schema: enzyme_kinetics
    key_facts:
      # Table 1 (Extended Data) lists 33 variants
      - { field: "reactions", condition: "length_gte", value: 25 }
      # Core variants that must be present
      - { field: "reactions[*].enzyme_name", condition: "contains_all",
          values: ["Des27", "Des27.7", "Des27.7 F113L"] }
      # Des27 parent: kcat/KM = 131 M-1s-1
      - { field: "reactions[enzyme_name=Des27].kinetics.kcat/KM",
          condition: "approx_eq", value: 131, tolerance: 0.15 }
      # Des27.7: kcat = 2.85 s-1
      - { field: "reactions[enzyme_name=Des27.7].kinetics.kcat",
          condition: "approx_eq", value: 2.85, tolerance: 0.15 }
      # Des27.7 F113L top variant: kcat/KM = 123274 M-1s-1
      - { field: "reactions[enzyme_name=Des27.7 F113L].kinetics.kcat/KM",
          condition: "approx_eq", value: 123274, tolerance: 0.15 }

  vision_image_analyzer:
    schema: vision_analysis
    key_facts:
      # Paper has 10+ reaction-related figures analyzed
      - { field: "analysis_results", condition: "length_gte", value: 5 }

  enzyme_extraction_summary:
    schema: enzyme_summary
    key_facts:
      # Summary should cover all 33 variants
      - { field: "statistics.total_variants", condition: "gte", value: 25 }
      # At least 3 top performers identified
      - { field: "top_performers", condition: "length_gte", value: 3 }
