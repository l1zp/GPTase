# Pre-commit hooks for GPTase
# Install: pre-commit install
# Run on all files: pre-commit run --all-files

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: debug-statements

  - repo: https://github.com/PyCQA/isort
    rev: 5.13.0
    hooks:
      - id: isort
        name: isort (python)
        args: ["--profile", "google"]

  - repo: local
    hooks:
      - id: yapf
        name: yapf
        entry: yapf
        language: system
        types: [python]
        args: ["--in-place", "--parallel", "--style=.style.yapf"]
