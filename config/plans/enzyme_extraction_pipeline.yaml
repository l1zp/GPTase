# Standard Enzyme Extraction Pipeline
# Structure scan -> (text + vision extraction, 3x replicas) -> SI scan ->
# normalization (deterministic) -> summary report.

plan_id: enzyme_extraction_pipeline
name: Standard Enzyme Extraction Pipeline
description: |
  Sequential workflow with parallel extraction:
  Structure Scan -> (LLM + Vision Extraction) -> Summary Report
version: "2.0"

steps:
  - id: "1"
    agent: document-structure-analyzer
    description: Perform physical scan of the document to locate tables and images.
    inputs:
      document_path: "{{document_path}}"

  - id: "2a"
    agent: enzyme-kinetics-extractor
    description: Extract structured kinetic parameters from document text.
    replicas: 3
    parallel_with: ["2b"]
    inputs:
      document_path: "{{document_path}}"
      relevant_sections: "{{step1.sections}}"
      relevant_tables: "{{step1.tables}}"

  - id: "2b"
    agent: vision-image-analyzer
    description: Analyze figures to extract tabular data using vision model.
    replicas: 3
    parallel_with: ["2a"]
    inputs:
      images: "{{step1.images}}"
      workspace_dir: "{{document_path}}"

  - id: "3s"
    agent: enzyme-kinetics-extractor
    description: Extract kinetic data from supplementary information document.
    optional: true
    skip_if: "{{si_document_path}} is empty"
    inputs:
      document_path: "{{si_document_path}}"
      relevant_sections: "{{step1.sections}}"
      relevant_tables: "{{step1.tables}}"

  - id: "4"
    agent: enzyme-variant-normalizer
    description: |
      Reconcile replicated extraction rows into normalized variant records,
      merging SI data when available. Pass full replica payloads so both
      `reactions` and `protein_sequences` reach the normalizer (sequences
      may appear in the main paper or SI).
    inputs:
      text_extraction_data: "{{step2a}}"
      vision_extraction_data: "{{step2b.extracted_tables}}"
      si_extraction_data: "{{step3s}}"
      document_path: "{{document_path}}"

  - id: "5"
    agent: enzyme-extraction-summary
    description: Generate statistical analysis and top-performer ranking from merged data.
    inputs:
      normalized_variant_data: "{{step4.normalized_variants}}"
      text_extraction_data: "{{step2a.reactions}}"
      vision_extraction_data: "{{step2b.extracted_tables}}"
