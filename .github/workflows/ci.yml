name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Install frontend dependencies
        working-directory: ui
        run: npm ci

      - name: Typecheck frontend
        working-directory: ui
        run: npm run typecheck

      - name: Build frontend
        working-directory: ui
        run: npm run build

  format-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yapf isort

      - name: Check import sorting with isort
        run: |
          isort --check-only --diff --profile=google gptase/ tests/ examples/
        continue-on-error: false

      - name: Check code formatting with yapf
        run: |
          yapf --diff --parallel --recursive gptase/ tests/ examples/
        continue-on-error: false

      - name: Format fix instructions
        if: failure()
        run: |
          echo "❌ Code formatting check failed!"
          echo ""
          echo "💡 To automatically fix formatting issues, run:"
          echo "   pip install yapf isort"
          echo "   isort --profile=google gptase/ tests/ examples/"
          echo "   yapf --in-place --parallel --recursive gptase/ tests/ examples/"
          echo ""
          echo "🔧 Or better yet, install pre-commit hooks:"
          echo "   pip install pre-commit"
          echo "   pre-commit install"
          echo ""
          echo "   Then pre-commit will auto-format on every commit!"
          exit 1

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mypy
          pip install -e .[dev]

      - name: Lint with mypy
        run: |
          mypy gptase/ --ignore-missing-imports || true

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run tests
        run: |
          pytest tests/ -v --cov=gptase --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
