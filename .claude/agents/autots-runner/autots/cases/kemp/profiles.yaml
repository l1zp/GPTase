  7VUU_core_p0_reactant:
    # P0 diagnostic: reactant-like endpoint (h=0, ring=0, n=0) with max_cycles=1
    # to capture Hessian signature near reactant minimum. Used to test the
    # "floppy-mode" hypothesis: if this endpoint also shows ~4 imag freqs with
    # |nu| < 100 cm^-1, they are inherent to the 31-atom cluster and unrelated
    # to reaction progress.
    cluster_path: design/ts/7VUU/reactant_complex_cluster_chainB_capped.pdb
    output_root: .claude/agents/autots-runner/autots/cases/kemp/runs/7VUU
