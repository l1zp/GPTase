schema: enzyme_kinetics_extractor
# Golden case: Alexandrova 2008 (designed Kemp eliminase variants)
# KE07 has its own crystal structure (2RKX); scaffold is TIM-barrel (1THF).
# Paper reports >= 3 variants with kcat and kcat/KM in Table 1.

key_facts:
  # Reactions array must be populated
  - field: "reactions"
    condition: min_length
    value: 3

  # KE07 variant PDB (2RKX) must appear somewhere in pdb_ids
  - field: "reactions[*].pdb_ids"
    condition: any_contains
    value: "2rkx"

  # Scaffold PDB must be 1THF (TIM-barrel template)
  - field: "reactions[*].scaffold_pdb_id"
    condition: any_contains
    value: "1thf"

  # kcat values must be extracted
  - field: "reactions[*].kinetics.kcat"
    condition: any_not_null
    value: true

  # kcat/KM values must be extracted
  - field: "reactions[*].kinetics.kcat_over_Km"
    condition: any_not_null
    value: true
